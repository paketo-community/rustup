api = "0.7"

[buildpack]
  description = "A Cloud Native Buildpack that installs and executes `rustup` to install Rust"
  homepage = "https://github.com/paketo-community/rustup"
  id = "paketo-community/rustup"
  keywords = ["rust", "rustup"]
  name = "Paketo Buildpack for Rustup"
  sbom-formats = ["application/vnd.cyclonedx+json", "application/vnd.syft+json"]
  version = "{{.version}}"

  [[buildpack.licenses]]
    type = "Apache-2.0"
    uri = "https://github.com/paketo-community/rustup/blob/main/LICENSE"

[metadata]
  include-files = ["LICENSE", "NOTICE", "README.md", "buildpack.toml", "linux/amd64/bin/build", "linux/amd64/bin/detect", "linux/amd64/bin/main", "linux/arm64/bin/build", "linux/arm64/bin/detect", "linux/arm64/bin/main"]
  pre-package = "scripts/build.sh"

  [[metadata.configurations]]
    build = true
    default = "stable"
    description = "the Rust toolchain or version number to install"
    name = "BP_RUST_TOOLCHAIN"

  [[metadata.configurations]]
    build = true
    default = "minimal"
    description = "the Rust profile to install"
    name = "BP_RUST_PROFILE"

  [[metadata.configurations]]
    build = true
    default = ""
    description = "an additional Rust target to install"
    name = "BP_RUST_TARGET"

  [[metadata.configurations]]
    build = true
    default = "true"
    description = "use rustup to install Rust"
    name = "BP_RUSTUP_ENABLED"

  [[metadata.configurations]]
    build = true
    default = "1"
    description = "the rustup version"
    name = "BP_RUSTUP_INIT_VERSION"

  [[metadata.configurations]]
    build = true
    default = "gnu"
    description = "libc implementation: gnu or musl"
    name = "BP_RUSTUP_INIT_LIBC"

  [[metadata.dependencies]]
    cpes = ["cpe:2.3:a:rust:rustup:1.29.0:*:*:*:*:*:*:*"]
    id = "rustup-init-gnu"
    name = "Rustup (GNU libc)"
    purl = "pkg:generic/rustup@1.29.0?arch=amd64"
    sha256 = "4acc9acc76d5079515b46346a485974457b5a79893cfb01112423c89aeb5aa10"
    source = "https://github.com/rust-lang/rustup/archive/refs/tags/1.29.0.tar.gz"
    source-sha256 = "de73d1a62f4d5409a2f6bdb1c523d8dc08aa6d9d63588db62493c19ca8f8bf55"
    stacks = ["*"]
    uri = "https://static.rust-lang.org/rustup/archive/1.29.0/x86_64-unknown-linux-gnu/rustup-init"
    version = "1.29.0"

    [[metadata.dependencies.licenses]]
      type = "Apache-2.0"
      uri = "https://github.com/rust-lang/rustup/blob/master/LICENSE-APACHE"

    [[metadata.dependencies.licenses]]
      type = "MIT"
      uri = "https://github.com/rust-lang/rustup/blob/master/LICENSE-MIT"

  [[metadata.dependencies]]
    cpes = ["cpe:2.3:a:rust:rustup:1.29.0:*:*:*:*:*:*:*"]
    id = "rustup-init-musl"
    name = "Rustup (musl libc)"
    purl = "pkg:generic/rustup@1.29.0?arch=amd64"
    sha256 = "9cd3fda5fd293890e36ab271af6a786ee22084b5f6c2b83fd8323cec6f0992c1"
    source = "https://github.com/rust-lang/rustup/archive/refs/tags/1.29.0.tar.gz"
    source-sha256 = "de73d1a62f4d5409a2f6bdb1c523d8dc08aa6d9d63588db62493c19ca8f8bf55"
    stacks = ["*"]
    uri = "https://static.rust-lang.org/rustup/archive/1.29.0/x86_64-unknown-linux-musl/rustup-init"
    version = "1.29.0"

    [[metadata.dependencies.licenses]]
      type = "Apache-2.0"
      uri = "https://github.com/rust-lang/rustup/blob/master/LICENSE-APACHE"

    [[metadata.dependencies.licenses]]
      type = "MIT"
      uri = "https://github.com/rust-lang/rustup/blob/master/LICENSE-MIT"

  [[metadata.dependencies]]
    cpes = ["cpe:2.3:a:rust:rustup:1.29.0:*:*:*:*:*:*:*"]
    id = "rustup-init-gnu"
    name = "Rustup (GNU libc)"
    purl = "pkg:generic/rustup@1.29.0?arch=arm64"
    sha256 = "9732d6c5e2a098d3521fca8145d826ae0aaa067ef2385ead08e6feac88fa5792"
    source = "https://github.com/rust-lang/rustup/archive/refs/tags/1.29.0.tar.gz"
    source-sha256 = "de73d1a62f4d5409a2f6bdb1c523d8dc08aa6d9d63588db62493c19ca8f8bf55"
    stacks = ["*"]
    uri = "https://static.rust-lang.org/rustup/archive/1.29.0/aarch64-unknown-linux-gnu/rustup-init"
    version = "1.29.0"

    [[metadata.dependencies.licenses]]
      type = "Apache-2.0"
      uri = "https://github.com/rust-lang/rustup/blob/master/LICENSE-APACHE"

    [[metadata.dependencies.licenses]]
      type = "MIT"
      uri = "https://github.com/rust-lang/rustup/blob/master/LICENSE-MIT"

  [[metadata.dependencies]]
    cpes = ["cpe:2.3:a:rust:rustup:1.29.0:*:*:*:*:*:*:*"]
    id = "rustup-init-musl"
    name = "Rustup (musl libc)"
    purl = "pkg:generic/rustup@1.29.0?arch=arm64"
    sha256 = "88761caacddb92cd79b0b1f939f3990ba1997d701a38b3e8dd6746a562f2a759"
    source = "https://github.com/rust-lang/rustup/archive/refs/tags/1.29.0.tar.gz"
    source-sha256 = "de73d1a62f4d5409a2f6bdb1c523d8dc08aa6d9d63588db62493c19ca8f8bf55"
    stacks = ["*"]
    uri = "https://static.rust-lang.org/rustup/archive/1.29.0/aarch64-unknown-linux-musl/rustup-init"
    version = "1.29.0"

    [[metadata.dependencies.licenses]]
      type = "Apache-2.0"
      uri = "https://github.com/rust-lang/rustup/blob/master/LICENSE-APACHE"

    [[metadata.dependencies.licenses]]
      type = "MIT"
      uri = "https://github.com/rust-lang/rustup/blob/master/LICENSE-MIT"

[[stacks]]
  id = "*"

[[targets]]
  arch = "amd64"
  os = "linux"

[[targets]]
  arch = "arm64"
  os = "linux"
